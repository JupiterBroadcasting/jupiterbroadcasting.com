description: 'dn-tool is a control-plane CLI that enrolls and unenrolls Linux hosts
  in a defined.net Managed Nebula network. It calls the defined.net REST API to create
  and delete host records and obtain single-use enrollment codes, then orchestrates
  the proprietary dnclient daemon  which it downloads and verifies at runtime. It
  is strictly control plane: it never reimplements Nebula and never replaces dnclient.'
